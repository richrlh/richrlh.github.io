<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do List App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: #475569;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Stats */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Input Section */
        .input-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: var(--bg-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-group input::placeholder {
            color: var(--text-secondary);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
            background: var(--bg-primary);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
            padding: 8px 12px;
            font-size: 0.875rem;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        .btn-check {
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 12px;
            font-size: 0.875rem;
            width: 44px;
            height: 44px;
            padding: 0;
        }

        .btn-check.completed {
            background: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .btn-check:hover {
            border-color: var(--primary-color);
        }

        /* Filter and Sort */
        .filter-sort {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .filter-btn:hover {
            border-color: var(--primary-color);
            color: var(--text-primary);
        }

        /* Tasks List */
        .tasks-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .task-list {
            list-style: none;
            max-height: 600px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            color: var(--text-primary);
            word-break: break-word;
            margin-bottom: 4px;
        }

        .task-priority {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .priority-high {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .priority-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }

        .priority-low {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .empty-state h3 {
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        /* Scrollbar Styling */
        .task-list::-webkit-scrollbar {
            width: 8px;
        }

        .task-list::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .task-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .task-list::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }

            .input-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .filter-sort {
                justify-content: center;
            }

            .task-item {
                flex-wrap: wrap;
            }

            .task-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .input-section {
                padding: 15px;
            }

            .stat-box {
                padding: 15px;
            }

            .stat-number {
                font-size: 1.5rem;
            }
        }

        /* Animations */
        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(20px);
            }
        }

        .task-item.removing {
            animation: fadeOut 0.3s ease forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>✓ To-Do List</h1>
            <p>Stay organized and productive</p>
        </div>

        <!-- Stats -->
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="progressPercent">0%</div>
                <div class="stat-label">Progress</div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..." 
                    maxlength="100"
                >
                <button class="btn btn-primary" id="addBtn">
                    <span>+</span> Add Task
                </button>
            </div>

            <div class="filter-sort">
                <button class="filter-btn active" data-filter="all">All Tasks</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="high">High Priority</button>
            </div>
        </div>

        <!-- Tasks List -->
        <div class="tasks-container">
            <ul class="task-list" id="taskList">
                <li class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    <h3>No tasks yet</h3>
                    <p>Add a task above to get started!</p>
                </li>
            </ul>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        // Firebase configuration - REPLACE WITH YOUR OWN CONFIG
        // Get these values from Firebase Console: https://console.firebase.google.com/
        const firebaseConfig = {
            apiKey: "AIzaSyDemonstration", // Replace with your API key
            authDomain: "your-project.firebaseapp.com", // Replace with your auth domain
            projectId: "your-project-id", // Replace with your project ID
            storageBucket: "your-project.appspot.com", // Replace with your storage bucket
            messagingSenderId: "123456789", // Replace with your sender ID
            appId: "1:123456789:web:abc123def456" // Replace with your app ID
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Task Manager with Firebase
        class TaskManager {
            constructor() {
                this.tasks = [];
                this.currentFilter = 'all';
                this.userId = null;
                this.unsubscribe = null;
                this.init();
            }

            init() {
                // Sign in anonymously
                signInAnonymously(auth).then(() => {
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            this.userId = user.uid;
                            this.setupFirebaseListener();
                            this.setupEventListeners();
                        }
                    });
                }).catch((error) => {
                    console.error('Firebase Auth Error:', error);
                    alert('Unable to connect to Firebase. Using local storage instead.');
                    this.tasks = this.loadTasksLocal();
                    this.setupEventListeners();
                    this.render();
                });
            }

            setupFirebaseListener() {
                // Real-time listener for tasks
                const q = query(collection(db, `users/${this.userId}/tasks`), orderBy('createdAt', 'desc'));
                this.unsubscribe = onSnapshot(q, (snapshot) => {
                    this.tasks = snapshot.docs.map(doc => ({
                        ...doc.data(),
                        firebaseId: doc.id
                    }));
                    this.render();
                });
            }

            setupEventListeners() {
                // Add task
                document.getElementById('addBtn').addEventListener('click', () => this.addTask());
                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTask();
                });

                // Filter buttons
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.filter;
                        this.render();
                    });
                });
            }

            async addTask() {
                const input = document.getElementById('taskInput');
                const taskText = input.value.trim();

                if (taskText === '') {
                    alert('Please enter a task');
                    return;
                }

                const task = {
                    text: taskText,
                    completed: false,
                    priority: 'medium',
                    createdAt: new Date()
                };

                try {
                    if (this.userId) {
                        await addDoc(collection(db, `users/${this.userId}/tasks`), task);
                    } else {
                        task.id = Date.now();
                        this.tasks.unshift(task);
                        this.saveTasksLocal();
                        this.render();
                    }
                    input.value = '';
                } catch (error) {
                    console.error('Error adding task:', error);
                    alert('Error adding task. Please try again.');
                }
            }

            async deleteTask(firebaseId) {
                try {
                    if (this.userId && firebaseId) {
                        await deleteDoc(doc(db, `users/${this.userId}/tasks`, firebaseId));
                    } else {
                        this.tasks = this.tasks.filter(task => task.firebaseId !== firebaseId && task.id !== firebaseId);
                        this.saveTasksLocal();
                        this.render();
                    }
                } catch (error) {
                    console.error('Error deleting task:', error);
                    alert('Error deleting task. Please try again.');
                }
            }

            async toggleTask(firebaseId) {
                const task = this.tasks.find(t => t.firebaseId === firebaseId || t.id === firebaseId);
                if (!task) return;

                try {
                    if (this.userId && firebaseId) {
                        await updateDoc(doc(db, `users/${this.userId}/tasks`, firebaseId), {
                            completed: !task.completed
                        });
                    } else {
                        task.completed = !task.completed;
                        this.saveTasksLocal();
                        this.render();
                    }
                } catch (error) {
                    console.error('Error updating task:', error);
                }
            }

            async setPriority(firebaseId, priority) {
                const task = this.tasks.find(t => t.firebaseId === firebaseId || t.id === firebaseId);
                if (!task) return;

                try {
                    if (this.userId && firebaseId) {
                        await updateDoc(doc(db, `users/${this.userId}/tasks`, firebaseId), {
                            priority: priority
                        });
                    } else {
                        task.priority = priority;
                        this.saveTasksLocal();
                        this.render();
                    }
                } catch (error) {
                    console.error('Error updating priority:', error);
                }
            }

            getFilteredTasks() {
                switch (this.currentFilter) {
                    case 'active':
                        return this.tasks.filter(t => !t.completed);
                    case 'completed':
                        return this.tasks.filter(t => t.completed);
                    case 'high':
                        return this.tasks.filter(t => t.priority === 'high');
                    default:
                        return this.tasks;
                }
            }

            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(t => t.completed).length;
                const pending = total - completed;
                const progress = total === 0 ? 0 : Math.round((completed / total) * 100);

                document.getElementById('totalCount').textContent = total;
                document.getElementById('completedCount').textContent = completed;
                document.getElementById('pendingCount').textContent = pending;
                document.getElementById('progressPercent').textContent = progress + '%';
            }

            render() {
                const taskList = document.getElementById('taskList');
                const filteredTasks = this.getFilteredTasks();

                this.updateStats();

                if (filteredTasks.length === 0) {
                    taskList.innerHTML = `
                        <li class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <h3>No tasks found</h3>
                            <p>${this.currentFilter === 'all' ? 'Add a task above to get started!' : 'No ' + this.currentFilter + ' tasks'}</p>
                        </li>
                    `;
                    return;
                }

                taskList.innerHTML = filteredTasks.map(task => `
                    <li class="task-item ${task.completed ? 'completed' : ''}">
                        <button class="btn-check ${task.completed ? 'completed' : ''}" onclick="taskManager.toggleTask('${task.firebaseId || task.id}')">
                            ${task.completed ? '✓' : ''}
                        </button>
                        <div class="task-content">
                            <div class="task-text">${this.escapeHtml(task.text)}</div>
                            <div>
                                <select class="filter-btn" style="padding: 4px 8px;" onchange="taskManager.setPriority('${task.firebaseId || task.id}', this.value)">
                                    <option value="low" ${task.priority === 'low' ? 'selected' : ''}>Low</option>
                                    <option value="medium" ${task.priority === 'medium' ? 'selected' : ''}>Medium</option>
                                    <option value="high" ${task.priority === 'high' ? 'selected' : ''}>High</option>
                                </select>
                                <span class="task-priority priority-${task.priority}">${task.priority}</span>
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="btn btn-danger" onclick="taskManager.deleteTask('${task.firebaseId || task.id}')">Delete</button>
                        </div>
                    </li>
                `).join('');
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            saveTasksLocal() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
            }

            loadTasksLocal() {
                const saved = localStorage.getItem('tasks');
                return saved ? JSON.parse(saved) : [];
            }
        }

        // Initialize the app
        window.taskManager = new TaskManager();
    </script>
</body>
</html>
