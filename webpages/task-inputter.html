<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feral Gremlin - Task Inputter</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="sidebar-container"></div>
    <main class="main-content">
        <div id="header-container"></div>
        <section class="task-page">
            <div class="task-controls">
                <div class="date-section">
                    <label for="taskDate">
                        Select Calendar Date
                    </label>

                    <input
                        type="date"
                        id="taskDate"
                    >
                </div>

                <button
                    id="openTaskModal"
                    class="add-task-btn"
                >
                    Add Task
                </button>
            </div>

            <div class="priority-layout">
                <div
                    class="priority-box"
                    data-priority="high"
                >
                    <h2>High</h2>
                    <div
                        id="highTasks"
                        class="task-dropzone"
                    ></div>
                </div>

                <div
                    class="priority-box"
                    data-priority="medium"
                >
                    <h2>Medium</h2>
                    <div
                        id="mediumTasks"
                        class="task-dropzone"
                    ></div>
                </div>

                <div
                    class="priority-box"
                    data-priority="low"
                >
                    <h2>Low</h2>
                    <div
                        id="lowTasks"
                        class="task-dropzone"
                    ></div>
                </div>
            </div>

            <div class="generate-container">
                <button
                    class="generate-btn"
                    id="generateSchedule"
                >
                    Generate Schedule
                </button>
            </div>
        </section>
    </main>

    <!-- TASK MODAL -->
    <div
        id="taskModal"
        class="modal hidden"
    >
        <div class="modal-content">
            <h2>Add New Task</h2>

            <label>
                Task Name
            </label>

            <input
                type="text"
                id="taskName"
                maxlength="100"
            >
          
            <label>
                Duration (Minutes)
            </label>

            <input
                type="number"
                id="taskDuration"
                min="5"
                step="5"
            >

            <div class="music-choice">
                <h3>Music Option</h3>
                <label>
                    <input
                        type="radio"
                        name="music"
                        value="default"
                        checked
                    >
                    Default Music
                </label>

                <label>
                    <input
                        type="radio"
                        name="music"
                        value="playlist"
                    >
                    From My Playlist
                </label>
            </div>

            <div class="modal-buttons">
                <button
                    id="finishTask"
                    class="add-task-btn"
                >
                    Finish
                </button>

                <button
                    id="cancelTask"
                    class="close-btn"
                >
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/task-inputter.js"></script>
</body>
</html>
